name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly run at 06:00 UTC to catch provider-side drift in staging.
    - cron: '0 6 * * *'

# Concurrency: Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable audit to speed up npm ci (audit is slow in CI)
  npm_config_audit: false

jobs:
  quality:
    name: Quality Checks (TypeScript & ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --audit=false
        timeout-minutes: 3

      - name: TypeScript type check
        run: npm run typecheck
        timeout-minutes: 5

      - name: ESLint code style check
        run: npm run lint
        timeout-minutes: 5

  playwright:
    name: Playwright API suite
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://api.staging.pungle.co' }}
      PROGRAM_ID: ${{ vars.PROGRAM_ID || '137' }}
      BP_API_KEY: ${{ secrets.BP_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (from cache)
        run: npm ci --audit=false
        timeout-minutes: 3

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        timeout-minutes: 5
        continue-on-error: true

      - name: Verify environment
        run: |
          echo "✓ BASE_URL: ${{ env.BASE_URL }}"
          echo "✓ PROGRAM_ID: ${{ env.PROGRAM_ID }}"
          if [ -z "${{ secrets.BP_API_KEY }}" ]; then
            echo "❌ BP_API_KEY: NOT SET (configure in Settings > Secrets > Actions)"
            exit 1
          else
            echo "✓ BP_API_KEY: ***"
          fi
          node -e "console.log('✓ Node:', process.version)"

      - name: Type-check
        run: npm run lint
        timeout-minutes: 5

      - name: Run Playwright API tests
        run: npx playwright test
        env:
          BP_API_KEY: ${{ secrets.BP_API_KEY }}
        timeout-minutes: 20

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/junit.xml
            test-results/results.json
          retention-days: 30
          compression-level: 6

      - name: Publish Playwright test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

  newman:
    name: Newman Postman tests
    runs-on: ubuntu-latest
    needs: playwright
    timeout-minutes: 25
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://api.staging.pungle.co' }}
      PROGRAM_ID: ${{ vars.PROGRAM_ID || '137' }}
      BP_API_KEY: ${{ secrets.BP_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (from cache)
        run: npm ci --audit=false
        timeout-minutes: 3

      - name: Verify environment
        run: |
          echo "✓ BASE_URL: ${{ env.BASE_URL }}"
          echo "✓ PROGRAM_ID: ${{ env.PROGRAM_ID }}"
          if [ -z "${{ secrets.BP_API_KEY }}" ]; then
            echo "❌ BP_API_KEY: NOT SET (configure in Settings > Secrets > Actions)"
            exit 1
          else
            echo "✓ BP_API_KEY: ***"
          fi
          node -e "console.log('✓ Node:', process.version)"

      - name: Run Newman tests
        run: npm run newman
        env:
          BP_API_KEY: ${{ secrets.BP_API_KEY }}
        timeout-minutes: 20

      - name: Publish Newman test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v1
        with:
          name: Newman Test Results
          path: newman-results/newman-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Newman artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: newman-artifacts
          path: |
            newman-results/
            load-tests/results/
          retention-days: 30
          compression-level: 6

  # Summary job to report test results
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [playwright, newman]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright | ${{ needs.playwright.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Newman | ${{ needs.newman.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Playwright Report**: HTML report with detailed test results" >> $GITHUB_STEP_SUMMARY
          echo "- **Newman Report**: Load test results and performance metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **JUnit Results**: Machine-readable test results for CI integration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the 'Artifacts' tab above to view detailed results locally." >> $GITHUB_STEP_SUMMARY
