name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly run at 06:00 UTC to catch provider-side drift in staging.
    - cron: '0 6 * * *'

# Concurrency: Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable audit to speed up npm ci (audit is slow in CI)
  npm_config_audit: false

jobs:
  setup:
    name: Setup & Cache Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clone for faster checkout
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Explicit cache configuration with key and restore-keys
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (including devDependencies)
        run: npm ci --audit=false
        timeout-minutes: 5
        continue-on-error: false

  playwright:
    name: Playwright API suite
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 25
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://api.staging.pungle.co' }}
      PROGRAM_ID: ${{ vars.PROGRAM_ID || '137' }}
      BP_API_KEY: ${{ secrets.BP_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (from cache)
        run: npm ci --audit=false
        timeout-minutes: 3

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        timeout-minutes: 5
        continue-on-error: true

      - name: Verify environment
        run: |
          echo "✓ BASE_URL: ${{ env.BASE_URL }}"
          echo "✓ PROGRAM_ID: ${{ env.PROGRAM_ID }}"
          if [ -z "${{ secrets.BP_API_KEY }}" ]; then
            echo "❌ BP_API_KEY: NOT SET (configure in Settings > Secrets > Actions)"
            exit 1
          else
            echo "✓ BP_API_KEY: ***"
          fi
          node -e "console.log('✓ Node:', process.version)"

      - name: Type-check
        run: npm run lint
        timeout-minutes: 5

      - name: Run Playwright API tests
        run: npx playwright test
        env:
          BP_API_KEY: ${{ secrets.BP_API_KEY }}
        timeout-minutes: 20

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          compression-level: 6

  newman:
    name: Newman Postman tests
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 25
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://api.staging.pungle.co' }}
      PROGRAM_ID: ${{ vars.PROGRAM_ID || '137' }}
      BP_API_KEY: ${{ secrets.BP_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (from cache)
        run: npm ci --audit=false
        timeout-minutes: 3

      - name: Verify environment
        run: |
          echo "✓ BASE_URL: ${{ env.BASE_URL }}"
          echo "✓ PROGRAM_ID: ${{ env.PROGRAM_ID }}"
          if [ -z "${{ secrets.BP_API_KEY }}" ]; then
            echo "❌ BP_API_KEY: NOT SET (configure in Settings > Secrets > Actions)"
            exit 1
          else
            echo "✓ BP_API_KEY: ***"
          fi
          node -e "console.log('✓ Node:', process.version)"

      - name: Run Newman tests
        run: npm run newman
        env:
          BP_API_KEY: ${{ secrets.BP_API_KEY }}
        timeout-minutes: 20
