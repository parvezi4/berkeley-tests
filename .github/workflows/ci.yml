name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly run at 06:00 UTC to catch provider-side drift in staging.
    - cron: '0 6 * * *'

jobs:
  playwright:
    name: Playwright API suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://api.staging.pungle.co' }}
      PROGRAM_ID: ${{ vars.PROGRAM_ID || '137' }}
      BP_API_KEY: ${{ secrets.BP_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment
        run: |
          echo "✓ BASE_URL: ${{ env.BASE_URL }}"
          echo "✓ PROGRAM_ID: ${{ env.PROGRAM_ID }}"
          echo "✓ BP_API_KEY: $([ -z '${{ secrets.BP_API_KEY }}' ] && echo 'NOT SET' || echo '***')"
          node -e "console.log('✓ Node:', process.version)"

      - name: Type-check
        run: npm run lint

      - name: Run Playwright API tests
        run: npx playwright test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  newman:
    name: Newman Postman tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://api.staging.pungle.co' }}
      PROGRAM_ID: ${{ vars.PROGRAM_ID || '137' }}
      BP_API_KEY: ${{ secrets.BP_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment
        run: |
          echo "✓ BASE_URL: ${{ env.BASE_URL }}"
          echo "✓ PROGRAM_ID: ${{ env.PROGRAM_ID }}"
          echo "✓ BP_API_KEY: $([ -z '${{ secrets.BP_API_KEY }}' ] && echo 'NOT SET' || echo '***')"
          node -e "console.log('✓ Node:', process.version)"

      - name: Run Newman tests
        run: npm run newman
